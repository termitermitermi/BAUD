<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="dyschan-api-base-url" content="https://dyschan-api.dyschan.workers.dev/api/">
<title>DYSCHAN</title>
<link rel="stylesheet" href="css/main.css">
</head>
<body data-page="index">
<header><h1>DYSCHAN</h1><p>Anonymous stateless messageboard</p></header>
<main>
  <section id="join-section">
    <h2>Join / Create Board</h2>
    <form id="join-form">
      <input type="text" id="phrase-input" placeholder="Shared board phrase" required autocomplete="off">
      <input type="text" id="board-name-input" placeholder="Board name (optional)">
      <button type="submit">Enter Board</button>
    </form>
    <p id="status"></p>
  </section>
  <section id="boards-section">
    <h2>Saved Boards</h2>
    <div id="saved-boards"></div>
  </section>
</main>
<script src="dist/crypto.js"></script>
<script src="dist/pow.js"></script>
<script src="dist/style.js"></script>
<script src="dist/clientConfig.js"></script>
<script src="dist/app.js"></script>
</body>
</html>
