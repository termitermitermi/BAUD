<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="css/main.css">
</head>
<body data-page="thread">
<header>

</header>
<main>
  <div id="thread-content"></div>
  <section id="reply-section">
    <h2>Reply</h2>

      <button type="submit">Post Reply</button>
    </form>
    <p id="reply-status"></p>
  </section>
</main>
